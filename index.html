<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triaden | Werkbänke | by cApZ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" id="main-style" href="https://cdn.jsdelivr.net/gh/MR-cApZ/nn-werkbank@main/style.css">
</head>
<body class="bg-dark text-white">
    <div class="d-flex" id="wrapper">
        
        <aside id="sidebar-wrapper" class="border-end d-flex flex-column border-secondary">
            <div class="p-3 border-bottom border-secondary">
                <h4 class="text-center mb-0 fw-bold text-white">NN Werkbänke</h4>
                <div id="db-status" class="text-center small mt-1" style="font-size: 0.65rem; opacity: 0.8;">Verbinde...</div>
            </div>

            <div class="px-3 pt-3">
                <div class="input-group input-group-sm">
                    <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-search"></i></span>
                    <input type="text" id="suche" class="form-control bg-dark text-white border-secondary shadow-none" placeholder="Suchen..."/>
                </div>
            </div>

            <nav id="sidebar-content" class="px-3 pt-2 flex-grow-1 overflow-auto"></nav>
        </aside>

        <div id="page-content-wrapper" class="flex-grow-1 d-flex flex-column">
            <header class="navbar border-bottom border-secondary p-3">
                <span class="navbar-brand mb-0 h1 fs-6 text-secondary text-uppercase" style="letter-spacing: 1px;">Datenbank / Übersicht</span>
            </header>

            <main class="container-fluid p-5 overflow-auto">
                <div id="item-details-view">
                    <div class="text-center mt-5 fade-in">
                        <i class="bi bi-info-circle display-1 opacity-25"></i>
                        <h3 class="mt-3 text-white">Wähle ein Item aus</h3>
                        <p class="text-secondary">Wähle links eine Kategorie oder ein Item aus der Werkbank.</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Wir nutzen jsDelivr für 100% korrekte Datei-Typen
        const repoBase = "https://cdn.jsdelivr.net/gh/MR-cApZ/nn-werkbank@main/";
        const cacheBuster = "?v=" + Date.now();

        function loadScript(name, fallback) {
            return new Promise((resolve) => {
                const script = document.createElement('script');
                script.src = repoBase + name + cacheBuster;
                script.onload = () => resolve(true);
                script.onerror = () => {
                    const fbScript = document.createElement('script');
                    fbScript.src = fallback;
                    fbScript.onload = () => resolve(false);
                    document.body.appendChild(fbScript);
                };
                document.body.appendChild(script);
            });
        }

        async function initApp() {
            const statusEl = document.getElementById('db-status');
            
            // 1. Datenbank laden
            const isLive = await loadScript('datenbank.js', './datenbank.js');
            // 2. Renderer laden
            await loadScript('renderer.js', './renderer.js');
            
            // 3. WICHTIG: Erst JETZT die Seitenleiste bauen
            if (typeof baueSeitenleiste === 'function') {
                baueSeitenleiste();
                statusEl.innerHTML = isLive 
                    ? '<span class="text-success">● Live-Daten aktiv</span>' 
                    : '<span class="text-warning">● Offline-Modus</span>';
            } else {
                statusEl.innerHTML = '<span class="text-danger">● Fehler: Renderer nicht geladen</span>';
            }

            // CSS Fallback
            fetch(document.getElementById('main-style').href).catch(() => {
                document.getElementById('main-style').href = 'style.css';
            });
        }

        // Startet alles
        initApp();
    </script>
</body>
</html>
