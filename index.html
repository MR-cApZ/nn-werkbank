<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triaden | Werkbänke | by cApZ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark"> <div class="d-flex" id="wrapper">
        
        <aside id="sidebar-wrapper" class="border-end d-flex flex-column">
            <div class="p-3 border-bottom border-secondary">
                <h4 class="text-center mb-0 fw-bold text-white">NN Werkbänke</h4>
            </div>

            <div class="px-3 pt-3">
                <div class="input-group input-group-sm">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" id="suche" class="form-control shadow-none" placeholder="Suchen..."/>
                </div>
            </div>

            <nav id="sidebar-content" class="px-3 pt-2 flex-grow-1 overflow-auto"></nav>
        </aside>

        <div id="page-content-wrapper" class="flex-grow-1 d-flex flex-column">
            <header class="navbar border-bottom p-3">
                <span class="navbar-brand mb-0 h1 fs-6 text-secondary text-uppercase" style="letter-spacing: 1px;">Datenbank / Übersicht</span>
            </header>

            <main class="container-fluid p-5 overflow-auto">
                <div id="item-details-view">
                    <div class="text-center mt-5 fade-in">
                        <i class="bi bi-info-circle display-1 opacity-25"></i>
                        <h3 class="mt-3">Wähle ein Item aus</h3>
                        <p>Wähle links eine Kategorie oder ein Item aus der Werkbank.</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="datenbank.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
